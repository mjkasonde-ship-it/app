# ---------------------------------------------------------------------------
# Cove Legal Tech – nginx config (frontend container)
# Serves the React SPA and proxies /api/* to the backend
# ---------------------------------------------------------------------------

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content-Security-Policy – tighten further once inline styles/scripts are removed
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https://customer-assets.emergentagent.com;
        connect-src 'self' http://localhost:8001 https://*.emergentagent.com wss:;
        frame-ancestors 'none';
    " always;

    # HSTS – enable only when you have HTTPS terminated at load balancer
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---------------------------------------------------------------------------
    # React SPA routing – serve index.html for all non-asset routes
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;

        # Cache control for HTML
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ---------------------------------------------------------------------------
    # Static asset caching
    # ---------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---------------------------------------------------------------------------
    # Health check endpoint
    # ---------------------------------------------------------------------------
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---------------------------------------------------------------------------
    # Block hidden files
    # ---------------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
}
