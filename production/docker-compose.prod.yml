# ---------------------------------------------------------------------------
# Cove Legal Tech – Production Docker Compose
# Enterprise-grade deployment for Zambia
# Usage: docker compose -f docker-compose.prod.yml up -d
# ---------------------------------------------------------------------------

version: "3.9"

services:

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: cove_mongo_prod
    restart: unless-stopped
    # Do NOT expose port to host – internal only
    # ports:
    #   - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_DATABASE: cove_db
      MONGO_INITDB_ROOT_USERNAME_FILE: /run/secrets/mongo_root_user
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_pass
    secrets:
      - mongo_root_user
      - mongo_root_pass
    networks:
      - cove_backend
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: ghcr.io/mjkasonde-ship-it/cove-backend:latest
    container_name: cove_backend_prod
    restart: unless-stopped
    # Internal only – no host port binding
    # ports:
    #   - "8001:8001"
    env_file:
      - ./backend/.env.prod
    environment:
      - ENVIRONMENT=production
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=cove_db
      - CORS_ORIGINS=https://app.cove.zm,https://staging.cove.zm
      - TRUSTED_HOSTS=app.cove.zm,staging.cove.zm
      - MAX_BODY_SIZE_MB=10
      - MAX_UPLOAD_SIZE_MB=50
      - SENTRY_TRACES_SAMPLE_RATE=0.1
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - cove_backend
      - cove_frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

  # ── Frontend (React → nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/mjkasonde-ship-it/cove-frontend:latest
    container_name: cove_frontend_prod
    restart: unless-stopped
    # Internal only
    # ports:
    #   - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=https://api.cove.zm
    depends_on:
      - backend
    networks:
      - cove_frontend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /var/cache/nginx:noexec,nosuid,size=50m
      - /var/run:noexec,nosuid,size=10m

  # ── Reverse Proxy (nginx) ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cove_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./production/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./production/ssl:/etc/nginx/ssl:ro
      - ./production/logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - cove_frontend
      - cove_backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ── Redis (for rate limiting & caching) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cove_redis_prod
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - cove_backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  redis_data:
    driver: local

networks:
  cove_backend:
    internal: true
  cove_frontend:
    internal: true

secrets:
  mongo_root_user:
    file: ./production/secrets/mongo_root_user.txt
  mongo_root_pass:
    file: ./production/secrets/mongo_root_pass.txt
