# ──────────────────────────────────────────────────────────────────────────────
# CoveLegal backend – project configuration
# ──────────────────────────────────────────────────────────────────────────────

[tool.isort]
# Use the Black-compatible profile so isort and Black never conflict
profile = "black"
line_length = 120
# Allow imports that span multiple lines without wrapping
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
# Skip files that are part of dependencies or auto-generated
skip_glob = ["*/migrations/*", "*/__pycache__/*", "*/.venv/*", "*/venv/*"]

[tool.black]
line-length = 120
target-version = ["py311"]
skip-string-normalization = false
