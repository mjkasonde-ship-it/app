# ---------------------------------------------------------------------------
# Cove Legal Tech – docker-compose.yml  (local development)
# Usage: docker compose up --build
# ---------------------------------------------------------------------------

version: "3.9"

services:

  # ── MongoDB ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: cove_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cove_db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cove_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env.local   # never commit this – see .env.example
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: cove_db
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend:/app          # hot-reload in dev; remove in prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React → nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: http://localhost:8001
    container_name: cove_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
    driver: local
